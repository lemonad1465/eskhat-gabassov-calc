[theme]
# Акцентный цвет (кнопки, активные элементы). 
# Используем глубокий синий вместо ярко-красного для серьезности.
primaryColor = "#0969da" 

# Основной фон (белый, но не "режущий" глаза)
backgroundColor = "#ffffff" 

# Фон боковой панели (второстепенный фон). 
# Делаем его чуть сероватым, чтобы отделить меню от контента.
secondaryBackgroundColor = "#f6f8fa" 

# Основной цвет текста (темно-серый, почти черный)
textColor = "#24292f" 

# Шрифт. "sans serif" — это шрифт без засечек (как Arial или Roboto), 
# самый читаемый вариант для веба.
font = "sans serif"


[client]
toolbarMode = "minimal"