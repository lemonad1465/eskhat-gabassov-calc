name: Build Windows EXE

on: [push] # Запускать сборку при каждом push в репозиторий

jobs:
  build:
    runs-on: windows-latest # Запуск на виртуальной машине с Windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Копируем твой код на сервер

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13' # Указываем версию Python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Если есть файл зависимостей, раскомментируй строку ниже:
        # pip install -r requirements.txt

    - name: Build EXE
      run: pyinstaller --onefile new_gui.py # Твоя команда сборки

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: dist/*.exe # Сохраняем результат