name: Build Windows EXE

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller sympy

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --add-data "backend.py;."
          --hidden-import sympy
          --hidden-import sympy.core
          --hidden-import sympy.functions
          --name "4D_CAS"
          app_tkinter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4D_CAS_Windows
          path: dist/4D_CAS.exe
